name: CI/CD_IngenieriaYcalidad
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  LintTest:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Prueba Lint
        run: npm run lint 

  SmokeTest:
    runs-on: ubuntu-latest
    needs: LintTest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Prueba Smoke
        run: node src/smoke-groups.js

  Build:
    runs-on: ubuntu-latest
    needs: SmokeTest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Build
        run: npm run build