name: CI/CD_IngenieriaYcalidad
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  LintTest:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Prueba Lint
        run: npm run lint

      - name: Notificar WhatsApp
        if: always()
        run: |
          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
            --data-urlencode "From=whatsapp:${{ secrets.TWILIO_WHATSAPP_FROM }}" \
            --data-urlencode "To=whatsapp:${{ secrets.TWILIO_WHATSAPP_TO }}" \
            --data-urlencode "Body=${{ job.status == 'correcto' && '✅' || '❌' }} *LintTest* ${{ job.status }}" \
            -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}"

  SmokeTest:
    runs-on: ubuntu-latest
    needs: LintTest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Prueba Smoke
        shell: bash
        run: |
          set -o pipefail
          node src/smoke-groups.js 2>&1 | tee smoke-output.txt

      - name: Extraer fallos
        if: always()
        run: |
          FAILURES=$(grep '^FAIL:' smoke-output.txt 2>/dev/null | sed 's/^FAIL: //' | head -10 | tr '\n' '; ')
          echo "SMOKE_FAILURES=${FAILURES}" >> $GITHUB_ENV

      - name: Notificar WhatsApp
        if: always()
        env:
          SMOKE_FAILURES: ${{ env.SMOKE_FAILURES }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            BODY="✅ *SmokeTest* correcto 🚬🚬🚬"
          else
            DETAIL="${SMOKE_FAILURES:-sin detalle}"
            BODY="❌ *SmokeTest* failure"$'\n'"Fallos: ${DETAIL}"
          fi
          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
            --data-urlencode "From=whatsapp:${{ secrets.TWILIO_WHATSAPP_FROM }}" \
            --data-urlencode "To=whatsapp:${{ secrets.TWILIO_WHATSAPP_TO }}" \
            --data-urlencode "Body=${BODY}" \
            -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}"

  Build:
    runs-on: ubuntu-latest
    needs: SmokeTest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Build
        run: npm run build

      - name: Notificar WhatsApp
        if: always()
        run: |
          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
            --data-urlencode "From=whatsapp:${{ secrets.TWILIO_WHATSAPP_FROM }}" \
            --data-urlencode "To=whatsapp:${{ secrets.TWILIO_WHATSAPP_TO }}" \
            --data-urlencode "Body=${{ job.status == 'correcto' && '✅' || '❌' }} *Build* ${{ job.status }} " \
            -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}"

  Deploy:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Intalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Traer config del proyecto de vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Con vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy con Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notificar WhatsApp
        if: always()
        run: |
          curl -X POST "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Messages.json" \
            --data-urlencode "From=whatsapp:${{ secrets.TWILIO_WHATSAPP_FROM }}" \
            --data-urlencode "To=whatsapp:${{ secrets.TWILIO_WHATSAPP_TO }}" \
            --data-urlencode "Body=${{ job.status == 'correcto' && '✅' || '❌' }} *Deploy* ${{ job.status }} ⬆️⬆️⬆️ - https://fixture-ci-cd.vercel.app/" \
            -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}"
